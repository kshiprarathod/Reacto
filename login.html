<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reacto - Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #f0f9ff 0%, #f8fafc 50%, #f0fdf4 100%);
        }
        .tab-content { display: none; opacity: 0; transition: opacity 0.3s ease; }
        .tab-content.active { display: block; opacity: 1; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <!-- Animated Background -->
    <div class="fixed inset-0 -z-10 overflow-hidden">
        <div class="absolute top-0 right-0 w-96 h-96 bg-blue-200/20 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
        <div class="absolute bottom-0 left-0 w-96 h-96 bg-emerald-200/20 rounded-full blur-3xl translate-y-1/2 -translate-x-1/2"></div>
    </div>

    <!-- Main Container -->
    <div class="w-full max-w-2xl">
        <!-- Back Button -->
        <a href="website.html" class="inline-flex items-center gap-2 text-slate-600 hover:text-slate-900 text-sm font-medium bg-white border border-slate-200 shadow-sm px-4 py-2 rounded-lg hover:bg-white transition mb-8">
            <span>&larr;</span> Back
        </a>

        <!-- Card -->
        <div class="bg-white border border-slate-200 rounded-2xl shadow-xl overflow-hidden">
            
            <!-- Form Section -->
            <div class="p-10 sm:p-16">
                <!-- Logo -->
                <div class="mb-8 text-center">
                    <div class="w-12 h-12 bg-blue-600 rounded-xl text-white flex items-center justify-center text-2xl mx-auto mb-4">💧</div>
                    <h1 class="text-3xl font-bold text-slate-900">Reacto</h1>
                    <p class="text-sm font-medium text-slate-600 mt-1">Smart STP Platform</p>
                </div>

                <!-- Primary Tabs: User / Admin -->
                <div class="flex gap-2 mb-6 bg-slate-100 p-1.5 rounded-lg border border-slate-200">
                    <button onclick="switchUserType('user')" id="btn-user" class="flex-1 py-2.5 px-4 font-semibold text-sm text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition">
                        👤 User
                    </button>
                    <button onclick="switchUserType('admin')" id="btn-admin" class="flex-1 py-2.5 px-4 font-semibold text-sm text-slate-600 hover:text-slate-900 transition">
                        🔐 Admin
                    </button>
                </div>

                <!-- Secondary Tabs: Sign In / Sign Up -->
                <div class="flex gap-2 mb-8 bg-slate-100 p-1.5 rounded-lg border border-slate-200">
                    <button onclick="switchTab('signin')" id="btn-signin" class="flex-1 py-2.5 px-4 font-semibold text-sm text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition">
                        Sign In
                    </button>
                    <button onclick="switchTab('signup')" id="btn-signup" class="flex-1 py-2.5 px-4 font-semibold text-sm text-slate-600 hover:text-slate-900 transition">
                        Sign Up
                    </button>
                </div>

                <!-- User Type Label -->
                <div class="mb-6 text-center">
                    <p class="text-xs font-black uppercase tracking-widest text-blue-600">
                        <span id="user-type-label">User Dashboard Access</span>
                    </p>
                </div>

                <!-- SIGN IN FORM -->
                <div id="tab-signin" class="tab-content active space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Email</label>
                        <input type="email" placeholder="your@email.com" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent text-slate-900 placeholder-slate-400">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
                        <input type="password" placeholder="Enter password" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent text-slate-900 placeholder-slate-400">
                    </div>
                    <div class="flex items-center justify-between text-sm">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-blue-600">
                            <span class="text-slate-700 font-normal">Remember me</span>
                        </label>
                        <a href="#" class="text-blue-600 hover:text-blue-700 font-medium">Forgot password?</a>
                    </div>
                    <button onclick="handleSignIn()" class="block w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition text-center">
                        Sign In
                    </button>
                    <p class="text-center text-sm text-slate-600 mt-4">
                        Don't have an account? 
                        <button onclick="switchTab('signup')" class="text-blue-600 hover:text-blue-700 font-semibold">Sign up</button>
                    </p>
                </div>

                <!-- SIGN UP FORM -->
                <div id="tab-signup" class="tab-content space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">First Name</label>
                            <input type="text" placeholder="John" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent text-slate-900 placeholder-slate-400">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Last Name</label>
                            <input type="text" placeholder="Doe" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent text-slate-900 placeholder-slate-400">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Company Name</label>
                        <input type="text" placeholder="Your Company" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent text-slate-900 placeholder-slate-400">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Email</label>
                        <input type="email" placeholder="your@email.com" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent text-slate-900 placeholder-slate-400">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
                        <input type="password" placeholder="Create password" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent text-slate-900 placeholder-slate-400">
                    </div>
                    <button onclick="alert('Account created successfully! Please check your email to verify.')" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition">
                        Create Account
                    </button>
                    <p class="text-center text-sm text-slate-600 mt-4">
                        Already have an account? 
                        <button onclick="switchTab('signin')" class="text-blue-600 hover:text-blue-700 font-semibold">Sign in</button>
                    </p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-8 text-center text-sm text-slate-600">
            <p>Secure • Encrypted • HTTPS Only</p>
        </div>
    </div>

    <script>
        let currentUserType = 'user';

        function switchUserType(type) {
            currentUserType = type;
            
            // Update user type tab styling
            document.querySelectorAll('button[id^="btn-user"], button[id^="btn-admin"]').forEach(el => {
                el.classList.remove('bg-blue-600', 'text-white', 'hover:bg-blue-700');
                el.classList.add('text-slate-600', 'hover:text-slate-900');
            });
            
            const btnElement = document.getElementById('btn-' + type);
            btnElement.classList.add('bg-blue-600', 'text-white', 'hover:bg-blue-700');
            btnElement.classList.remove('text-slate-600', 'hover:text-slate-900');
            
            // Update label
            const label = document.getElementById('user-type-label');
            if (type === 'user') {
                label.textContent = 'User Dashboard Access';
            } else {
                label.textContent = 'Admin Control Center Access';
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('button[id^="btn-signin"], button[id^="btn-signup"]').forEach(el => {
                el.classList.remove('bg-blue-600', 'text-white', 'hover:bg-blue-700');
                el.classList.add('text-slate-600', 'hover:text-slate-900');
            });
            
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('btn-' + tab).classList.add('bg-blue-600', 'text-white', 'hover:bg-blue-700');
            document.getElementById('btn-' + tab).classList.remove('text-slate-600', 'hover:text-slate-900');
        }

        function handleSignIn() {
            if (currentUserType === 'user') {
                window.location.href = 'user.html';
            } else {
                window.location.href = 'admin.html';
            }
        }
    </script>
</body>
</html>
